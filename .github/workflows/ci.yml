name: Relay node — lint

on:
  push:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 flask requests
      - run: flake8 src/ --max-line-length=120 --ignore=E501,W503
      - run: |
          cd src
          python -c "import relay_gateway; print('relay_gateway OK')"
